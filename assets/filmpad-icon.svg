      <text x="51" y="83" font-size="13">2</text>
      <text x="88" y="83" font-size="13">4</text>
      <text x="10" y="94" font-size="4.7">DIRECTOR</text>
      <text x="40" y="94" font-size="6">JOHN DOE</text>
